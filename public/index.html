<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <h2>Add Student</h2>
    <form action="/api/students" method="POST">
        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="rollNumber" placeholder="Roll No" required>
        <input type="text" name="branch" placeholder="Branch" required>
        <input type="number" name="marks" placeholder="Marks" required>
        <button type="submit">Add</button>
    </form>

    <h2>Students List</h2>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Roll No.</th>
            <th>Branch</th>
            <th>Marks</th>
            <th>Actions</th>
        </tr>

        <%= students.forEach(element => { %>
            <tr>
                <td><%= element.name %></td>
                <td><%= element.rollNumber %></td>
                <td><%= element.branch %></td>
                <td>
                    <form action="/api/students/<%= element._id %>?_method=PUT" method="POST">
                        <input type="number" name="marks" value="<%= element.marks %>">
                        <button type="submit">Update</button>
                    </form>
                </td>
                <td>
                    <form action="/api/students/<%= element._id %>?_method=DELETE" method="POST">
                        <button type="submit">Delete</button>
                    </form>
                </td>
            </tr>
        <% }) %>

    </table>
</body>
</html>
